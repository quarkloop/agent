syntax = "proto3";

package quark.secrets.v1;

option go_package = "github.com/quarkloop/pkg/serviceapi/gen/quark/secrets/v1;secretsv1";

// SecretsService isolates secret resolution, scoped token issuing, lease
// lifecycle, rotation, and access audit behind OpenBao.
service SecretsService {
  rpc ResolveRef(ResolveRefRequest) returns (ResolveRefResponse);
  rpc IssueScopedSecret(IssueScopedSecretRequest) returns (IssueScopedSecretResponse);
  rpc RenewLease(RenewLeaseRequest) returns (RenewLeaseResponse);
  rpc RevokeLease(RevokeLeaseRequest) returns (RevokeLeaseResponse);
  rpc RotateSecret(RotateSecretRequest) returns (RotateSecretResponse);
  rpc AuditAccess(AuditAccessRequest) returns (AuditAccessResponse);
}

message ResolveRefRequest {
  string secret_ref = 1;
  string field = 2;
  string purpose = 3;
  string actor_id = 4;
  bool include_value = 5;
}

message ResolveRefResponse {
  SecretMaterial secret = 1;
  string audit_id = 2;
}

message IssueScopedSecretRequest {
  string scope = 1;
  repeated string policies = 2;
  int64 ttl_seconds = 3;
  bool renewable = 4;
  map<string, string> metadata = 5;
}

message IssueScopedSecretResponse {
  ScopedSecret secret = 1;
  string audit_id = 2;
}

message RenewLeaseRequest {
  string lease_id = 1;
  int64 increment_seconds = 2;
}

message RenewLeaseResponse {
  Lease lease = 1;
  string audit_id = 2;
}

message RevokeLeaseRequest {
  string lease_id = 1;
  bool sync = 2;
  string reason = 3;
}

message RevokeLeaseResponse {
  string lease_id = 1;
  bool revoked = 2;
  string audit_id = 3;
}

message RotateSecretRequest {
  string secret_ref = 1;
  string field = 2;
  string value = 3;
  int64 check_and_set_version = 4;
  string reason = 5;
}

message RotateSecretResponse {
  string secret_ref = 1;
  int64 version = 2;
  string audit_id = 3;
}

message AuditAccessRequest {
  string secret_ref = 1;
  string action = 2;
  string actor_id = 3;
  string outcome = 4;
  map<string, string> metadata = 5;
}

message AuditAccessResponse {
  string audit_id = 1;
  string recorded_at = 2;
}

message SecretMaterial {
  string ref = 1;
  string field = 2;
  string value = 3;
  bool value_redacted = 4;
  Lease lease = 5;
}

message ScopedSecret {
  string scope = 1;
  string token = 2;
  string accessor = 3;
  repeated string policies = 4;
  Lease lease = 5;
}

message Lease {
  string lease_id = 1;
  int64 duration_seconds = 2;
  bool renewable = 3;
}
