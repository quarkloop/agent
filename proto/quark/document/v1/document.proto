syntax = "proto3";

package quark.document.v1;

option go_package = "github.com/quarkloop/pkg/serviceapi/gen/quark/document/v1;documentv1";

// DocumentService performs mechanical document inspection and extraction.
//
// It does not call an LLM, infer semantic schemas, extract facts, choose
// chunks, or write to an index. Agents use its outputs as source evidence for
// LLM-owned semantic extraction.
service DocumentService {
  rpc DetectType(DetectTypeRequest) returns (DetectTypeResponse);
  rpc ParseBytes(ParseBytesRequest) returns (ParseBytesResponse);
  rpc ExtractText(ExtractTextRequest) returns (ExtractTextResponse);
  rpc ExtractLayout(ExtractLayoutRequest) returns (ExtractLayoutResponse);
  rpc GetPages(GetPagesRequest) returns (GetPagesResponse);
  rpc ExtractTables(ExtractTablesRequest) returns (ExtractTablesResponse);
  rpc ExtractImages(ExtractImagesRequest) returns (ExtractImagesResponse);
  rpc RunOCR(RunOCRRequest) returns (RunOCRResponse);
}

message DocumentInput {
  string source_uri = 1;
  string content_ref = 2;
  bytes content = 3;
  string filename = 4;
  string mime_type = 5;
  map<string, string> metadata = 6;
}

message DetectTypeRequest {
  DocumentInput input = 1;
}

message DetectTypeResponse {
  string mime_type = 1;
  string extension = 2;
  string document_family = 3;
  float confidence = 4;
  map<string, string> metadata = 5;
}

message ParseBytesRequest {
  DocumentInput input = 1;
}

message ParseBytesResponse {
  string document_id = 1;
  string source_hash = 2;
  string mime_type = 3;
  string document_family = 4;
  int32 page_count = 5;
  bool text_available = 6;
  map<string, string> metadata = 7;
}

message ExtractTextRequest {
  DocumentInput input = 1;
  int32 max_chars = 2;
}

message ExtractTextResponse {
  string text = 1;
  repeated PageText pages = 2;
  string source_hash = 3;
}

message PageText {
  int32 page_number = 1;
  string text = 2;
  int32 start_offset = 3;
  int32 end_offset = 4;
}

message ExtractLayoutRequest {
  DocumentInput input = 1;
}

message ExtractLayoutResponse {
  repeated LayoutPage pages = 1;
}

message LayoutPage {
  int32 page_number = 1;
  float width = 2;
  float height = 3;
  repeated LayoutBlock blocks = 4;
}

message LayoutBlock {
  string kind = 1;
  string text = 2;
  BoundingBox box = 3;
}

message BoundingBox {
  float x = 1;
  float y = 2;
  float width = 3;
  float height = 4;
}

message GetPagesRequest {
  DocumentInput input = 1;
}

message GetPagesResponse {
  repeated Page pages = 1;
}

message Page {
  int32 page_number = 1;
  string text = 2;
  repeated LayoutBlock blocks = 3;
  repeated Table tables = 4;
  repeated Image images = 5;
}

message ExtractTablesRequest {
  DocumentInput input = 1;
}

message ExtractTablesResponse {
  repeated Table tables = 1;
}

message Table {
  int32 page_number = 1;
  string title = 2;
  repeated string headers = 3;
  repeated TableRow rows = 4;
  BoundingBox box = 5;
}

message TableRow {
  repeated string cells = 1;
}

message ExtractImagesRequest {
  DocumentInput input = 1;
}

message ExtractImagesResponse {
  repeated Image images = 1;
}

message Image {
  int32 page_number = 1;
  string image_ref = 2;
  string mime_type = 3;
  BoundingBox box = 4;
  map<string, string> metadata = 5;
}

message RunOCRRequest {
  DocumentInput input = 1;
  repeated int32 page_numbers = 2;
  string language_hint = 3;
}

message RunOCRResponse {
  repeated PageText pages = 1;
  float confidence = 2;
  string engine = 3;
}
