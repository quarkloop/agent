syntax = "proto3";

package quark.service.v1;

import "google/protobuf/empty.proto";

option go_package = "github.com/quarkloop/pkg/serviceapi/gen/quark/service/v1;servicev1";

// ServiceRegistry provides runtime discovery metadata for NATS service functions.
service ServiceRegistry {
  rpc ListServices(google.protobuf.Empty) returns (ListServicesResponse);
  rpc GetService(GetServiceRequest) returns (ServiceDescriptor);
}

message ListServicesResponse {
  repeated ServiceDescriptor services = 1;
}

message GetServiceRequest {
  string name = 1;
}

message ServiceDescriptor {
  string name = 1;
  string type = 2;
  string version = 3;
  reserved 4;
  reserved "address";
  repeated RpcDescriptor rpcs = 5;
  repeated SkillDescriptor skills = 6;
}

message RpcDescriptor {
  string service = 1;
  string method = 2;
  string request = 3;
  string response = 4;
  string description = 5;
  string owner = 6;
  string function_name = 7;
  string risk_level = 8;
  bool approval_required = 9;
  repeated string approval_requirements = 10;
  bool streaming = 11;
  bool idempotent = 12;
  int32 timeout_millis = 13;
  RetryPolicy retry_policy = 14;
  repeated ServiceFunctionExample examples = 15;
  string subject = 16;
}

message RetryPolicy {
  int32 max_attempts = 1;
  repeated string retryable_codes = 2;
  int32 initial_backoff_millis = 3;
  int32 max_backoff_millis = 4;
}

message ServiceFunctionExample {
  string name = 1;
  string description = 2;
  string request_json = 3;
}

message SkillDescriptor {
  string name = 1;
  string version = 2;
  string markdown = 3;
}
