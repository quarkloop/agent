syntax = "proto3";

package quark.indexer.v1;

option go_package = "github.com/quarkloop/pkg/serviceapi/gen/quark/indexer/v1;indexerv1";

// IndexerService stores and retrieves agent-produced structured GraphRAG data.
//
// The indexer never calls an LLM and never parses raw documents. Agents provide
// text chunks, embeddings, entities, relationships, and query embeddings.
service IndexerService {
  rpc UpsertDocument(UpsertDocumentRequest) returns (IndexStatus);
  rpc UpsertChunk(UpsertChunkRequest) returns (IndexStatus);
  rpc UpsertFact(UpsertFactRequest) returns (IndexStatus);
  rpc UpsertEntity(UpsertEntityRequest) returns (IndexStatus);
  rpc UpsertRelation(UpsertRelationRequest) returns (IndexStatus);
  rpc UpsertCitation(UpsertCitationRequest) returns (IndexStatus);
  rpc IndexDocument(IndexRequest) returns (IndexStatus);
  rpc QueryContext(QueryRequest) returns (ContextResponse);
  rpc GetContext(QueryRequest) returns (ContextResponse);
  rpc DeleteDocument(DeleteDocumentRequest) returns (DeleteDocumentResponse);
  rpc DeleteChunk(DeleteChunkRequest) returns (DeleteChunkResponse);
}

message IndexRequest {
  string chunk_id = 1;
  string text_content = 2;
  repeated float embedding = 3;
  repeated Entity entities = 4;
  repeated Relation relations = 5;
  map<string, string> source_metadata = 6;
  Document document = 7;
  EmbeddingMetadata embedding_metadata = 8;
  repeated Fact facts = 9;
  repeated Citation citations = 10;
  Provenance provenance = 11;
}

message UpsertDocumentRequest {
  Document document = 1;
}

message UpsertChunkRequest {
  string chunk_id = 1;
  string text_content = 2;
  repeated float embedding = 3;
  map<string, string> source_metadata = 4;
  Document document = 5;
  EmbeddingMetadata embedding_metadata = 6;
  repeated Fact facts = 7;
  repeated Citation citations = 8;
  Provenance provenance = 9;
  repeated Entity entities = 10;
  repeated Relation relations = 11;
}

message UpsertFactRequest {
  Fact fact = 1;
  string chunk_id = 2;
}

message UpsertEntityRequest {
  Entity entity = 1;
}

message UpsertRelationRequest {
  Relation relation = 1;
  string chunk_id = 2;
}

message UpsertCitationRequest {
  Citation citation = 1;
  string chunk_id = 2;
}

message Document {
  string id = 1;
  string name = 2;
  string type = 3;
  string source_uri = 4;
  map<string, string> metadata = 5;
  repeated SourceReference sources = 6;
}

message EmbeddingMetadata {
  string provider = 1;
  string model = 2;
  int32 dimensions = 3;
  string content_hash = 4;
  string version = 5;
  repeated string modalities = 6;
}

message Entity {
  string id = 1;
  string name = 2;
  string type = 3;
}

message Relation {
  string from_id = 1;
  string to_id = 2;
  string relation = 3;
}

message Fact {
  string id = 1;
  string subject = 2;
  string predicate = 3;
  string object = 4;
  float confidence = 5;
  repeated Citation citations = 6;
  map<string, string> metadata = 7;
}

message Citation {
  string id = 1;
  string source_uri = 2;
  string chunk_id = 3;
  string text_span = 4;
  int32 start_offset = 5;
  int32 end_offset = 6;
  float confidence = 7;
  int32 page_number = 8;
  string media_ref = 9;
  string modality = 10;
}

message Provenance {
  string source_uri = 1;
  string source_hash = 2;
  string ingested_at = 3;
  string produced_by = 4;
  string trace_id = 5;
  map<string, string> metadata = 6;
  repeated SourceReference sources = 7;
}

message SourceReference {
  string modality = 1;
  string mime_type = 2;
  int32 page_number = 3;
  string content_ref = 4;
  string media_ref = 5;
  string content_hash = 6;
  string source_uri = 7;
  map<string, string> metadata = 8;
}

message IndexStatus {
  bool success = 1;
  string message = 2;
}

message QueryRequest {
  repeated float query_vector = 1;
  int32 depth = 2;
  int32 limit = 3;
  map<string, string> filters = 4;
}

message ContextResponse {
  string reasoning_context = 1;
  repeated string citations = 2;
  repeated Chunk chunks = 3;
  GraphFragment graph = 4;
  ContextPackage context_package = 5;
}

message Chunk {
  string id = 1;
  string text = 2;
  float score = 3;
  map<string, string> metadata = 4;
  Document document = 5;
  EmbeddingMetadata embedding_metadata = 6;
  repeated Fact facts = 7;
  repeated Citation citations = 8;
  Provenance provenance = 9;
}

message GraphNode {
  string id = 1;
  string label = 2;
  string type = 3;
}

message GraphEdge {
  string from_id = 1;
  string to_id = 2;
  string relation = 3;
}

message GraphFragment {
  repeated GraphNode nodes = 1;
  repeated GraphEdge edges = 2;
}

message ContextPackage {
  repeated Chunk chunks = 1;
  repeated Fact facts = 2;
  repeated Citation citations = 3;
  repeated Provenance provenance = 4;
  GraphFragment graph = 5;
  float confidence = 6;
}

message DeleteChunkRequest {
  string chunk_id = 1;
}

message DeleteChunkResponse {
  bool deleted = 1;
}

message DeleteDocumentRequest {
  string document_id = 1;
}

message DeleteDocumentResponse {
  bool deleted = 1;
}
