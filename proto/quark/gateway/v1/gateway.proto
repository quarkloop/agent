syntax = "proto3";

package quark.gateway.v1;

option go_package = "github.com/quarkloop/pkg/serviceapi/gen/quark/gateway/v1;gatewayv1";

// GatewayService is the single agent-facing model boundary. Provider adapters
// are private implementation details; runtime receives model output and
// structured usage only through this contract.
service GatewayService {
  rpc Generate(GenerateRequest) returns (GenerateResponse);
  rpc StreamGenerate(StreamGenerateRequest) returns (stream StreamGenerateResponse);
  rpc Embed(EmbedRequest) returns (EmbedResponse);
  rpc Rerank(RerankRequest) returns (RerankResponse);
  rpc CountTokens(CountTokensRequest) returns (CountTokensResponse);
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc ProviderHealth(ProviderHealthRequest) returns (ProviderHealthResponse);
  rpc UsageSummary(UsageSummaryRequest) returns (UsageSummaryResponse);
  rpc ReloadConfig(ReloadConfigRequest) returns (ReloadConfigResponse);
}

message GenerateRequest {
  string provider = 1;
  string model = 2;
  repeated ModelMessage messages = 3;
  repeated ToolSchema tools = 4;
  map<string, string> options = 5;
}

message GenerateResponse {
  string text = 1;
  repeated ToolCall tool_calls = 2;
  ModelUsage usage = 3;
}

message StreamGenerateRequest {
  string provider = 1;
  string model = 2;
  repeated ModelMessage messages = 3;
  repeated ToolSchema tools = 4;
  map<string, string> options = 5;
}

message StreamGenerateResponse {
  string delta = 1;
  repeated ToolCall tool_calls = 2;
  bool done = 3;
  ModelUsage usage = 4;
}

message EmbedRequest {
  string provider = 1;
  string model = 2;
  repeated MultimodalInput inputs = 3;
  int32 dimensions = 4;
  map<string, string> options = 5;
}

message EmbedResponse {
  repeated Embedding embeddings = 1;
  ModelUsage usage = 2;
}

message RerankRequest {
  string provider = 1;
  string model = 2;
  string query = 3;
  repeated string documents = 4;
  map<string, string> options = 5;
}

message RerankResponse {
  repeated RerankResult results = 1;
  ModelUsage usage = 2;
}

message CountTokensRequest {
  string provider = 1;
  string model = 2;
  repeated ModelMessage messages = 3;
  repeated ToolSchema tools = 4;
}

message CountTokensResponse {
  int64 tokens = 1;
  ModelUsage usage = 2;
}

message ListModelsRequest {
  string provider = 1;
}

message ListModelsResponse {
  repeated ModelInfo models = 1;
}

message ProviderHealthRequest {
  string provider = 1;
}

message ProviderHealthResponse {
  string provider = 1;
  bool healthy = 2;
  string status = 3;
}

message UsageSummaryRequest {}

message UsageSummaryResponse {
  repeated UsageAggregate usage = 1;
}

message ReloadConfigRequest {
  repeated GatewayProviderConfig providers = 1;
  repeated GatewayFallbackPolicy fallbacks = 2;
}

message ReloadConfigResponse {
  bool reloaded = 1;
  repeated string providers = 2;
  string message = 3;
}

message GatewayProviderConfig {
  string id = 1;
  string kind = 2;
  string base_url = 3;
  string model = 4;
  bool enabled = 5;
  string embedding_model = 6;
}

message GatewayFallbackPolicy {
  string provider = 1;
  repeated string fallbacks = 2;
}

message ModelMessage {
  string role = 1;
  repeated ContentPart content = 2;
  repeated ToolCall tool_calls = 3;
  string tool_call_id = 4;
}

// MultimodalInput is one embedding unit. A provider returns one vector for
// each input, including when the input combines text and image content.
message MultimodalInput {
  repeated ContentPart content = 1;
  map<string, string> metadata = 2;
}

// ContentPart is normalized Gateway input. Reference kinds are accepted at
// the runtime tool boundary and must be resolved before provider dispatch.
message ContentPart {
  ContentKind kind = 1;
  string text = 2;
  string image_url = 3;
  bytes image_data = 4;
  string mime_type = 5;
  string ref = 6;
  map<string, string> metadata = 7;
}

enum ContentKind {
  CONTENT_KIND_UNSPECIFIED = 0;
  CONTENT_KIND_TEXT = 1;
  CONTENT_KIND_IMAGE_URL = 2;
  CONTENT_KIND_IMAGE_DATA = 3;
  CONTENT_KIND_CONTENT_REF = 4;
  CONTENT_KIND_IMAGE_REF = 5;
  CONTENT_KIND_PAGE_REF = 6;
  CONTENT_KIND_ARTIFACT_REF = 7;
  CONTENT_KIND_FILE_REF = 8;
}

message ToolSchema {
  string name = 1;
  string description = 2;
  string parameters_json = 3;
}

message ToolCall {
  int32 index = 1;
  string id = 2;
  string type = 3;
  string name = 4;
  string arguments_json = 5;
}

message Embedding {
  repeated float vector = 1;
  string provider = 2;
  string model = 3;
  int32 dimensions = 4;
  string content_hash = 5;
}

message RerankResult {
  int32 index = 1;
  float score = 2;
}

message ModelInfo {
  string id = 1;
  string provider = 2;
  string name = 3;
  int32 context_window = 4;
  bool default_model = 5;
}

message ModelUsage {
  string provider = 1;
  string model = 2;
  int64 input_tokens = 3;
  int64 output_tokens = 4;
  int64 reasoning_tokens = 5;
  int64 cached_tokens = 6;
  int64 embedding_tokens = 7;
  int64 latency_millis = 8;
  double cost_estimate = 9;
  repeated string fallback_chain = 10;
  string request_id = 11;
  string finish_reason = 12;
}

message UsageAggregate {
  string provider = 1;
  string model = 2;
  int64 requests = 3;
  int64 input_tokens = 4;
  int64 output_tokens = 5;
  int64 embedding_tokens = 6;
  int64 total_tokens = 7;
  int64 latency_millis = 8;
  double cost_estimate = 9;
  repeated string fallback_chain = 10;
}
