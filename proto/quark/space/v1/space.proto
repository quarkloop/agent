syntax = "proto3";

package quark.space.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/quarkloop/pkg/serviceapi/gen/quark/space/v1;spacev1";

// SpaceService owns authoritative persisted space config and low-level
// per-space opaque records. Callers own record semantics.
service SpaceService {
  rpc CreateSpace(CreateSpaceRequest) returns (Space);
  rpc UpdateConfig(UpdateConfigRequest) returns (Space);
  rpc GetSpace(GetSpaceRequest) returns (Space);
  rpc ListSpaces(google.protobuf.Empty) returns (ListSpacesResponse);
  rpc DeleteSpace(DeleteSpaceRequest) returns (google.protobuf.Empty);
  rpc GetConfig(GetConfigRequest) returns (ConfigResponse);
  rpc PutRecord(PutRecordRequest) returns (Record);
  rpc GetRecord(GetRecordRequest) returns (Record);
  rpc ListRecords(ListRecordsRequest) returns (ListRecordsResponse);
  rpc DeleteRecord(DeleteRecordRequest) returns (google.protobuf.Empty);
  rpc Doctor(DoctorRequest) returns (DoctorResponse);
}

message Space {
  string name = 1;
  string version = 2;
  string working_dir = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message CreateSpaceRequest {
  bytes config = 1;
}

message UpdateConfigRequest {
  bytes config = 1;
}

message GetSpaceRequest {
  string name = 1;
}

message ListSpacesResponse {
  repeated Space spaces = 1;
}

message DeleteSpaceRequest {
  string name = 1;
}

message GetConfigRequest {
  string name = 1;
}

message ConfigResponse {
  string name = 1;
  string version = 2;
  bytes config = 3;
  google.protobuf.Timestamp updated_at = 4;
}

message PutRecordRequest {
  string name = 1;
  string namespace = 2;
  string key = 3;
  bytes data = 4;
}

message GetRecordRequest {
  string name = 1;
  string namespace = 2;
  string key = 3;
}

message ListRecordsRequest {
  string name = 1;
  string namespace = 2;
}

message DeleteRecordRequest {
  string name = 1;
  string namespace = 2;
  string key = 3;
}

message Record {
  string namespace = 1;
  string key = 2;
  bytes data = 3;
  google.protobuf.Timestamp updated_at = 4;
}

message ListRecordsResponse {
  repeated Record records = 1;
}

message DoctorRequest {
  string name = 1;
}

message DoctorResponse {
  bool ok = 1;
  repeated DoctorIssue issues = 2;
}

message DoctorIssue {
  string severity = 1;
  string message = 2;
}
