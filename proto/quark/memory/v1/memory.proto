syntax = "proto3";

package quark.memory.v1;

option go_package = "github.com/quarkloop/pkg/serviceapi/gen/quark/memory/v1;memoryv1";

// MemoryService stores explicit agent memory records for a space.
//
// It does not infer memories from raw prompts or call another service. Agents
// decide what should be remembered and provide provenance.
service MemoryService {
  rpc Put(PutRequest) returns (PutResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message PutRequest {
  string space = 1;
  string collection = 2;
  string key = 3;
  string value = 4;
  map<string, string> metadata = 5;
  string provenance = 6;
}

message GetRequest {
  string space = 1;
  string collection = 2;
  string key = 3;
}

message SearchRequest {
  string space = 1;
  string collection = 2;
  string query = 3;
  int32 limit = 4;
  map<string, string> filters = 5;
}

message DeleteRequest {
  string space = 1;
  string collection = 2;
  string key = 3;
}

message MemoryRecord {
  string id = 1;
  string space = 2;
  string collection = 3;
  string key = 4;
  string value = 5;
  map<string, string> metadata = 6;
  string provenance = 7;
  string updated_at = 8;
}

message PutResponse {
  MemoryRecord record = 1;
}

message GetResponse {
  MemoryRecord record = 1;
}

message SearchResponse {
  repeated MemoryRecord records = 1;
}

message DeleteResponse {
  bool deleted = 1;
}
