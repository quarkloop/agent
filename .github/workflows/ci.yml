name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Vet
        run: make vet

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Architecture boundaries
        run: make arch-check

      - name: Dead-code check
        run: make dead-code-check

      - name: Provider-independent contract E2E
        run: make test-e2e-local
