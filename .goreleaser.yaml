version: 2

project_name: quark

builds:
  - id: runtime
    dir: runtime
    main: ./cmd/runtime
    binary: runtime
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: quark
    dir: cli
    main: ./cmd/quark
    binary: quark
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/quarkloop/cli/pkg/buildinfo.Version={{.Version}}

  - id: io-service
    dir: services/io
    main: ./cmd/io
    binary: io-service
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"
      - "^refactor:"
