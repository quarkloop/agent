name: quark

x-go-build: &go-build
  context: ../..
  dockerfile: deploy/docker/Dockerfile.go-binary

x-service-defaults: &service-defaults
  restart: unless-stopped
  user: ${QUARK_CONTAINER_USER:-quark}
  networks:
    - quark
  env_file:
    - ../../.env.example
  environment:
    QUARK_NATS_URL: nats://supervisor:4222
    QUARK_NATS_USER: quark-control
    QUARK_NATS_PASSWORD: quark-control-dev
    QUARK_NATS_AUDIT_PREFIX: audit
    QUARK_NATS_TELEMETRY_PREFIX: telemetry

services:
  supervisor:
    <<: *service-defaults
    build:
      <<: *go-build
      args:
        PACKAGE: ./supervisor/cmd/supervisor
    command:
      - start
      - --bundled-plugins-dir
      - /plugins
      - --installed-plugins-dir
      - /var/lib/quark/plugins
      - --nats-state-dir
      - /var/lib/quark/nats
      - --nats-client-port
      - "4222"
      - --nats-websocket-port
      - "9222"
      - --nats-monitor-port
      - "8222"
    ports:
      - "127.0.0.1:${QUARK_NATS_CLIENT_PORT:-4222}:4222"
      - "127.0.0.1:${QUARK_NATS_MONITOR_PORT:-8222}:8222"
      - "127.0.0.1:${QUARK_NATS_WEBSOCKET_PORT:-9222}:9222"
    volumes:
      - ../../plugins:/plugins:ro
      - supervisor-state:/var/lib/quark
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8222/healthz"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s

  runtime:
    <<: *service-defaults
    profiles: ["runtime"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./runtime/cmd/runtime
    command: ["start", "--channel", "nats"]
    depends_on:
      supervisor:
        condition: service_healthy
    environment:
      QUARK_NATS_URL: nats://supervisor:4222
      QUARK_NATS_USER: ${QUARK_RUNTIME_NATS_USER:-quark-control}
      QUARK_NATS_PASSWORD: ${QUARK_RUNTIME_NATS_PASSWORD:-quark-control-dev}
      QUARK_SPACE: ${QUARK_SPACE:-default}
      QUARK_MODEL_PROVIDER: ${QUARK_MODEL_PROVIDER:-openrouter}
      QUARK_MODEL_NAME: ${QUARK_MODEL_NAME:-openai/gpt-5-mini}
      QUARK_GATEWAY_REQUEST_TIMEOUT: ${QUARK_GATEWAY_REQUEST_TIMEOUT:-2m}
      QUARK_GATEWAY_MAX_OUTPUT_TOKENS: ${QUARK_GATEWAY_MAX_OUTPUT_TOKENS:-4096}

  io:
    <<: *service-defaults
    profiles: ["services"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/io/cmd/io
    command: ["--skill-dir", "/plugins/services/io"]
    depends_on:
      supervisor:
        condition: service_healthy
    volumes:
      - ../../plugins:/plugins:ro
      - spaces:/var/lib/quark/spaces
      - ${QUARK_E2E_WORKING_DIR:-/tmp/quark-e2e-workspace}:${QUARK_E2E_WORKING_DIR:-/tmp/quark-e2e-workspace}

  space:
    <<: *service-defaults
    profiles: ["services"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/space/cmd/space
    command: ["--root", "/var/lib/quark/spaces", "--skill-dir", "/plugins/services/space"]
    depends_on:
      supervisor:
        condition: service_healthy
    volumes:
      - ../../plugins:/plugins:ro
      - spaces:/var/lib/quark/spaces

  document:
    <<: *service-defaults
    profiles: ["services"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/document/cmd/document
    command: ["--skill-dir", "/plugins/services/document"]
    depends_on:
      supervisor:
        condition: service_healthy
    volumes:
      - ../../plugins:/plugins:ro
      - ${QUARK_E2E_WORKING_DIR:-/tmp/quark-e2e-workspace}:${QUARK_E2E_WORKING_DIR:-/tmp/quark-e2e-workspace}

  runstate:
    <<: *service-defaults
    profiles: ["services"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/runstate/cmd/runstate
    command: ["--root", "/var/lib/quark/runstate", "--skill-dir", "/plugins/services/runstate", "--nats-url", "nats://supervisor:4222", "--nats-user", "quark-control", "--nats-password", "quark-control-dev"]
    depends_on:
      supervisor:
        condition: service_healthy
    volumes:
      - ../../plugins:/plugins:ro
      - runstate-records:/var/lib/quark/runstate

  indexer:
    <<: *service-defaults
    profiles: ["services", "knowledge"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/indexer/cmd/indexer
    command: ["--dgraph", "dgraph:9080", "--skill-dir", "/plugins/services/indexer"]
    depends_on:
      supervisor:
        condition: service_healthy
      dgraph:
        condition: service_started
    volumes:
      - ../../plugins:/plugins:ro

  gateway:
    <<: *service-defaults
    profiles: ["services", "gateway"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/gateway/cmd/gateway
    command: ["--skill-dir", "/plugins/services/gateway", "--nats-url", "nats://supervisor:4222", "--nats-user", "quark-control", "--nats-password", "quark-control-dev"]
    depends_on:
      supervisor:
        condition: service_healthy
    volumes:
      - ../../plugins:/plugins:ro
    environment:
      QUARK_NATS_URL: nats://supervisor:4222
      QUARK_NATS_USER: quark-control
      QUARK_NATS_PASSWORD: quark-control-dev
      QUARK_GATEWAY_EMBEDDING_PROVIDER: ${QUARK_GATEWAY_EMBEDDING_PROVIDER:-openrouter}
      QUARK_GATEWAY_TIMEOUT: ${QUARK_GATEWAY_TIMEOUT:-2m}
      QUARK_OPENROUTER_PROVIDER_KIND: ${QUARK_OPENROUTER_PROVIDER_KIND:-openai-compatible}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL:-}

  workflow:
    <<: *service-defaults
    profiles: ["services", "workflow"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/workflow/cmd/workflow
    command: ["--skill-dir", "/plugins/services/workflow", "--temporal-addr", "temporal:7233", "--nats-url", "nats://supervisor:4222", "--nats-user", "quark-control", "--nats-password", "quark-control-dev"]
    depends_on:
      supervisor:
        condition: service_healthy
      temporal:
        condition: service_started
    volumes:
      - ../../plugins:/plugins:ro

  secrets:
    <<: *service-defaults
    profiles: ["services", "secrets"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/secrets/cmd/secrets
    command: ["--skill-dir", "/plugins/services/secrets", "--openbao-addr", "http://openbao:8200", "--openbao-token", "${QUARK_OPENBAO_TOKEN:-dev-root}", "--nats-url", "nats://supervisor:4222", "--nats-user", "quark-control", "--nats-password", "quark-control-dev"]
    depends_on:
      supervisor:
        condition: service_healthy
      openbao:
        condition: service_started
    volumes:
      - ../../plugins:/plugins:ro

  citation:
    <<: *service-defaults
    profiles: ["services", "knowledge"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/citation/cmd/citation
    command: ["--skill-dir", "/plugins/services/citation"]
    depends_on:
      supervisor:
        condition: service_healthy
    volumes:
      - ../../plugins:/plugins:ro

  core:
    <<: *service-defaults
    profiles: ["services"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/core/cmd/core
    command: ["--root", "/var/lib/quark/core", "--skill-dir", "/plugins/services/core"]
    depends_on:
      supervisor:
        condition: service_healthy
    volumes:
      - ../../plugins:/plugins:ro
      - core-state:/var/lib/quark/core

  devops:
    <<: *service-defaults
    profiles: ["services", "devops"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/devops/cmd/devops
    command: ["--skill-dir", "/plugins/services/devops"]
    depends_on:
      supervisor:
        condition: service_healthy
    volumes:
      - ../../plugins:/plugins:ro
      - ${QUARK_E2E_WORKING_DIR:-/tmp/quark-e2e-workspace}:${QUARK_E2E_WORKING_DIR:-/tmp/quark-e2e-workspace}

  system:
    <<: *service-defaults
    profiles: ["services", "system"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/system/cmd/system
    command: ["--skill-dir", "/plugins/services/system"]
    depends_on:
      supervisor:
        condition: service_healthy
    volumes:
      - ../../plugins:/plugins:ro

  harness:
    <<: *service-defaults
    profiles: ["services", "knowledge"]
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.rust-harness
    command: ["--root", "/var/lib/quark/harness", "--nats-url", "nats://supervisor:4222", "--nats-user", "quark-control", "--nats-password", "quark-control-dev"]
    depends_on:
      supervisor:
        condition: service_healthy
    volumes:
      - harness-state:/var/lib/quark/harness

  dgraph:
    image: dgraph/standalone:v25.0.0
    profiles: ["services", "knowledge"]
    restart: unless-stopped
    networks:
      - quark
    volumes:
      - dgraph-data:/dgraph

  vector:
    image: timberio/vector:0.50.0-debian
    profiles: ["observability"]
    restart: unless-stopped
    networks:
      - quark
    depends_on:
      supervisor:
        condition: service_healthy
    volumes:
      - ../vector/vector.toml:/etc/vector/vector.toml:ro
    command: ["--config", "/etc/vector/vector.toml"]
    environment:
      QUARK_NATS_URL: nats://supervisor:4222
      QUARK_NATS_USER: quark-control
      QUARK_NATS_PASSWORD: quark-control-dev

  nats-exporter:
    image: natsio/prometheus-nats-exporter:0.19.2
    profiles: ["observability"]
    restart: unless-stopped
    networks:
      - quark
    depends_on:
      supervisor:
        condition: service_healthy
    command:
      - -varz
      - http://supervisor:8222
      - -connz
      - http://supervisor:8222
      - -jsz
      - http://supervisor:8222
    ports:
      - "7777:7777"

  vmagent:
    image: victoriametrics/vmagent:v1.129.1
    profiles: ["observability"]
    restart: unless-stopped
    networks:
      - quark
    depends_on:
      nats-exporter:
        condition: service_started
      victoria-metrics:
        condition: service_started
    command:
      - -promscrape.config=/etc/vmagent/vmagent.yml
      - -remoteWrite.url=http://victoria-metrics:8428/api/v1/write
    ports:
      - "8429:8429"
    volumes:
      - ../victoria/vmagent.yml:/etc/vmagent/vmagent.yml:ro

  victoria-metrics:
    image: victoriametrics/victoria-metrics:v1.129.1
    profiles: ["observability"]
    restart: unless-stopped
    networks:
      - quark
    command: ["-storageDataPath=/victoria-metrics-data"]
    ports:
      - "8428:8428"
    volumes:
      - victoria-metrics-data:/victoria-metrics-data

  openbao:
    image: openbao/openbao:2.3
    profiles: ["services", "secrets"]
    restart: unless-stopped
    networks:
      - quark
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    environment:
      BAO_DEV_ROOT_TOKEN_ID: ${BAO_DEV_ROOT_TOKEN_ID:-dev-root}
    command: ["server", "-dev", "-dev-listen-address=0.0.0.0:8200"]

  temporal:
    image: temporalio/auto-setup:1.29
    profiles: ["services", "workflow"]
    restart: unless-stopped
    networks:
      - quark
    ports:
      - "7233:7233"

networks:
  quark:

volumes:
  supervisor-state:
  spaces:
  runstate-records:
  core-state:
  harness-state:
  dgraph-data:
  victoria-metrics-data:
