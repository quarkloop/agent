name: quark

x-go-build: &go-build
  context: ../..
  dockerfile: deploy/docker/Dockerfile.go-binary

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - quark
  env_file:
    - ../../.env.example

services:
  supervisor:
    <<: *service-defaults
    build:
      <<: *go-build
      args:
        PACKAGE: ./supervisor/cmd/supervisor
    command:
      - start
      - --port
      - "7200"
      - --bundled-plugins-dir
      - /plugins
      - --nats-state-dir
      - /var/lib/quark/nats
      - --nats-client-port
      - "4222"
      - --nats-websocket-port
      - "9222"
      - --nats-monitor-port
      - "8222"
    ports:
      - "7200:7200"
      - "4222:4222"
      - "8222:8222"
      - "9222:9222"
    volumes:
      - ../../plugins:/plugins:ro
      - supervisor-state:/var/lib/quark
      - spaces:/var/lib/quark/spaces
    environment:
      QUARK_SPACES_ROOT: /var/lib/quark/spaces
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7200/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s

  runtime:
    <<: *service-defaults
    profiles: ["runtime"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./runtime/cmd/runtime
    command: ["start", "--port", "8765", "--channel", "web"]
    depends_on:
      supervisor:
        condition: service_healthy
    ports:
      - "8765:8765"
    volumes:
      - spaces:/var/lib/quark/spaces
    environment:
      QUARK_SUPERVISOR_URL: http://supervisor:7200
      QUARK_SPACE: ${QUARK_SPACE:-default}
      QUARK_PLUGINS_DIR: /var/lib/quark/spaces/${QUARK_SPACE:-default}/plugins
      QUARK_MODEL_PROVIDER: ${QUARK_MODEL_PROVIDER:-openrouter}
      QUARK_MODEL_NAME: ${QUARK_MODEL_NAME:-openai/gpt-5-mini}

  io:
    <<: *service-defaults
    profiles: ["services"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/io/cmd/io
    command: ["--addr", "0.0.0.0:7308", "--skill-dir", "/plugins/services/io"]
    ports:
      - "7308:7308"
    volumes:
      - ../../plugins:/plugins:ro
      - spaces:/var/lib/quark/spaces

  space:
    <<: *service-defaults
    profiles: ["services"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/space/cmd/space
    command: ["--addr", "0.0.0.0:7303", "--root", "/var/lib/quark/spaces", "--skill-dir", "/plugins/services/space"]
    ports:
      - "7303:7303"
    volumes:
      - ../../plugins:/plugins:ro
      - spaces:/var/lib/quark/spaces

  document:
    <<: *service-defaults
    profiles: ["services"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/document/cmd/document
    command: ["--addr", "0.0.0.0:7305", "--skill-dir", "/plugins/services/document"]
    ports:
      - "7305:7305"
    volumes:
      - ../../plugins:/plugins:ro

  runstate:
    <<: *service-defaults
    profiles: ["services"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/runstate/cmd/runstate
    command: ["--addr", "0.0.0.0:7306", "--root", "/var/lib/quark/runstate", "--skill-dir", "/plugins/services/runstate", "--nats-url", "nats://supervisor:4222", "--nats-user", "quark-control", "--nats-password", "quark-control-dev"]
    ports:
      - "7306:7306"
    volumes:
      - ../../plugins:/plugins:ro
      - runstate-records:/var/lib/quark/runstate

  indexer:
    <<: *service-defaults
    profiles: ["services", "knowledge"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/indexer/cmd/indexer
    command: ["--addr", "0.0.0.0:7301", "--dgraph", "dgraph:9080", "--skill-dir", "/plugins/services/indexer"]
    depends_on:
      dgraph:
        condition: service_started
    ports:
      - "7301:7301"
    volumes:
      - ../../plugins:/plugins:ro

  gateway:
    <<: *service-defaults
    profiles: ["services", "gateway"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/gateway/cmd/gateway
    command: ["--addr", "0.0.0.0:7309", "--skill-dir", "/plugins/services/gateway", "--nats-url", "nats://supervisor:4222", "--nats-user", "quark-control", "--nats-password", "quark-control-dev"]
    depends_on:
      supervisor:
        condition: service_healthy
    ports:
      - "7309:7309"
    volumes:
      - ../../plugins:/plugins:ro
    environment:
      QUARK_GATEWAY_EMBEDDING_PROVIDER: ${QUARK_GATEWAY_EMBEDDING_PROVIDER:-openrouter}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL:-}

  workflow:
    <<: *service-defaults
    profiles: ["services", "workflow"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/workflow/cmd/workflow
    command: ["--addr", "0.0.0.0:7315", "--skill-dir", "/plugins/services/workflow", "--temporal-addr", "temporal:7233", "--nats-url", "nats://supervisor:4222", "--nats-user", "quark-control", "--nats-password", "quark-control-dev"]
    depends_on:
      supervisor:
        condition: service_healthy
      temporal:
        condition: service_started
    ports:
      - "7315:7315"
    volumes:
      - ../../plugins:/plugins:ro

  secrets:
    <<: *service-defaults
    profiles: ["services", "secrets"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/secrets/cmd/secrets
    command: ["--addr", "0.0.0.0:7316", "--skill-dir", "/plugins/services/secrets", "--openbao-addr", "http://openbao:8200", "--openbao-token", "${QUARK_OPENBAO_TOKEN:-dev-root}", "--nats-url", "nats://supervisor:4222", "--nats-user", "quark-control", "--nats-password", "quark-control-dev"]
    depends_on:
      supervisor:
        condition: service_healthy
      openbao:
        condition: service_started
    ports:
      - "7316:7316"
    volumes:
      - ../../plugins:/plugins:ro

  citation:
    <<: *service-defaults
    profiles: ["services", "knowledge"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/citation/cmd/citation
    command: ["--addr", "0.0.0.0:7310", "--skill-dir", "/plugins/services/citation"]
    ports:
      - "7310:7310"
    volumes:
      - ../../plugins:/plugins:ro

  core:
    <<: *service-defaults
    profiles: ["services"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/core/cmd/core
    command: ["--addr", "0.0.0.0:7311", "--root", "/var/lib/quark/core", "--skill-dir", "/plugins/services/core"]
    ports:
      - "7311:7311"
    volumes:
      - ../../plugins:/plugins:ro
      - core-state:/var/lib/quark/core

  devops:
    <<: *service-defaults
    profiles: ["services", "devops"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/devops/cmd/devops
    command: ["--addr", "0.0.0.0:7312", "--skill-dir", "/plugins/services/devops"]
    ports:
      - "7312:7312"
    volumes:
      - ../../plugins:/plugins:ro

  system:
    <<: *service-defaults
    profiles: ["services", "system"]
    build:
      <<: *go-build
      args:
        PACKAGE: ./services/system/cmd/system
    command: ["--addr", "0.0.0.0:7313", "--skill-dir", "/plugins/services/system"]
    ports:
      - "7313:7313"
    volumes:
      - ../../plugins:/plugins:ro

  dgraph:
    image: dgraph/standalone:latest
    profiles: ["knowledge"]
    restart: unless-stopped
    networks:
      - quark
    ports:
      - "8080:8080"
      - "9080:9080"
    volumes:
      - dgraph-data:/dgraph

  vector:
    image: timberio/vector:0.50.0-debian
    profiles: ["observability"]
    restart: unless-stopped
    networks:
      - quark
    depends_on:
      supervisor:
        condition: service_healthy
    volumes:
      - ../vector/vector.toml:/etc/vector/vector.toml:ro
    command: ["--config", "/etc/vector/vector.toml"]
    environment:
      QUARK_NATS_URL: nats://supervisor:4222
      QUARK_NATS_USER: quark-control
      QUARK_NATS_PASSWORD: quark-control-dev

  nats-exporter:
    image: natsio/prometheus-nats-exporter:0.19.2
    profiles: ["observability"]
    restart: unless-stopped
    networks:
      - quark
    depends_on:
      supervisor:
        condition: service_healthy
    command:
      - -varz
      - http://supervisor:8222
      - -connz
      - http://supervisor:8222
      - -jsz
      - http://supervisor:8222
    ports:
      - "7777:7777"

  vmagent:
    image: victoriametrics/vmagent:v1.129.1
    profiles: ["observability"]
    restart: unless-stopped
    networks:
      - quark
    depends_on:
      nats-exporter:
        condition: service_started
      victoria-metrics:
        condition: service_started
    command:
      - -promscrape.config=/etc/vmagent/vmagent.yml
      - -remoteWrite.url=http://victoria-metrics:8428/api/v1/write
    ports:
      - "8429:8429"
    volumes:
      - ../victoria/vmagent.yml:/etc/vmagent/vmagent.yml:ro

  victoria-metrics:
    image: victoriametrics/victoria-metrics:v1.129.1
    profiles: ["observability"]
    restart: unless-stopped
    networks:
      - quark
    command: ["-storageDataPath=/victoria-metrics-data"]
    ports:
      - "8428:8428"
    volumes:
      - victoria-metrics-data:/victoria-metrics-data

  openbao:
    image: openbao/openbao:2.3
    profiles: ["secrets"]
    restart: unless-stopped
    networks:
      - quark
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    environment:
      BAO_DEV_ROOT_TOKEN_ID: ${BAO_DEV_ROOT_TOKEN_ID:-dev-root}
    command: ["server", "-dev", "-dev-listen-address=0.0.0.0:8200"]

  temporal:
    image: temporalio/auto-setup:1.29
    profiles: ["workflow"]
    restart: unless-stopped
    networks:
      - quark
    ports:
      - "7233:7233"

networks:
  quark:
    name: quark

volumes:
  supervisor-state:
  spaces:
  runstate-records:
  core-state:
  dgraph-data:
  victoria-metrics-data:
