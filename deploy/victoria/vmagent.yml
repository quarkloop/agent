global:
  scrape_interval: 15s
  scrape_timeout: 5s

scrape_configs:
  - job_name: quark_nats
    metrics_path: /metrics
    static_configs:
      - targets:
          - nats-exporter:7777

  - job_name: quark_vmagent
    metrics_path: /metrics
    static_configs:
      - targets:
          - vmagent:8429
