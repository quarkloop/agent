name: quark-system
version: "1.0.0"
type: agent
mode: api
description: "Quark System agent profile"
author: quarkloop
license: Apache-2.0

agent:
  profile: PROFILE.yaml
  system: SYSTEM.md
  skill: SKILL.md
  tools:
    - bash
  services:
    - system.*
    - process.*
    - network.*
    - logs.*
    - metrics.*
    - scheduler.*
    - policy.*
  skills:
    - SKILL.md
