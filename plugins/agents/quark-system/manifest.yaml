name: quark-system
version: "1.0.0"
type: agent
description: "Quark System agent profile"
author: quarkloop
license: Apache-2.0

agent:
  profile: PROFILE.yaml
  system: SYSTEM.md
  skill: SKILL.md
  tools: []
  services:
    - system_Snapshot
    - system_GetOSInfo
    - system_GetKernelInfo
    - system_GetUptime
    - system_ListPackages
    - system_ListServices
    - system_ListUsers
    - system_ListMounts
    - system_GetDiskUsage
    - system_ListProcesses
    - system_ListPorts
    - system_ListNetworkConnections
    - system_ReadLogs
    - system_GetMetrics
    - system_KillProcess
    - system_RestartService
    - harness_GetContextReport
    - harness_StreamContextReports
    - harness_PutMemory
    - harness_GetMemory
    - harness_SearchMemory
    - harness_DeleteMemory
  skills:
    - SKILL.md
