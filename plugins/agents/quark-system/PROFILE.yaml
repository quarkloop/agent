id: quark-system
name: Quark System
description: Inspects and explains local system state through typed service functions.
model:
  provider: ""
  model: ""
prompt:
  system: SYSTEM.md
  skills:
    - SKILL.md
permissions:
  tools: []
  services:
    - system_Snapshot
    - system_GetOSInfo
    - system_GetKernelInfo
    - system_GetUptime
    - system_ListPackages
    - system_ListServices
    - system_ListUsers
    - system_ListMounts
    - system_GetDiskUsage
    - system_ListProcesses
    - system_ListPorts
    - system_ListNetworkConnections
    - system_ReadLogs
    - system_GetMetrics
    - system_KillProcess
    - system_RestartService
memory:
  scope: space
  collections:
    - system_observations
approval:
  required_for:
    - process.kill
    - service.restart
    - system.mutate
    - system_KillProcess
    - system_RestartService
handoff:
  can_delegate_to:
    - quark-knowledge
    - quark-devops
evaluation:
  required_checks:
    - observation_grounding
    - approval_for_mutation
