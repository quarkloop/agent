name: quark-knowledge
version: "1.0.0"
type: agent
mode: api
description: "Quark Knowledge agent profile"
author: quarkloop
license: Apache-2.0

agent:
  profile: PROFILE.yaml
  system: SYSTEM.md
  skill: SKILL.md
  tools:
    - fs
  services:
    - document_DetectType
    - document_ParseBytes
    - document_ExtractText
    - document_ExtractLayout
    - document_GetPages
    - document_ExtractTables
    - document_ExtractImages
    - document_RunOCR
    - ingestion_StartRun
    - ingestion_GetRun
    - ingestion_ListRuns
    - ingestion_ResumeRun
    - ingestion_UpdateSourceState
    - ingestion_AppendArtifact
    - ingestion_MarkFailed
    - ingestion_MarkComplete
    - ingestion_CancelRun
    - ingestion_ListIncompleteSources
    - ingestion_ListArtifacts
    - embedding_Embed
    - indexer_UpsertDocument
    - indexer_UpsertChunk
    - indexer_UpsertFact
    - indexer_UpsertEntity
    - indexer_UpsertRelation
    - indexer_UpsertCitation
    - indexer_IndexDocument
    - indexer_QueryContext
    - indexer_GetContext
    - indexer_DeleteDocument
    - indexer_DeleteChunk
    - citation_ResolveSpans
    - citation_CreateCitation
    - citation_VerifyGrounding
    - citation_ScoreCoverage
    - citation_RenderReferences
    - memory_Put
    - memory_Get
    - memory_Search
    - memory_Delete
  skills:
    - SKILL.md
