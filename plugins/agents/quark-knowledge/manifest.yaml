name: quark-knowledge
version: "1.0.0"
type: agent
mode: api
description: "Quark Knowledge agent profile"
author: quarkloop
license: Apache-2.0

agent:
  profile: PROFILE.yaml
  system: SYSTEM.md
  skill: SKILL.md
  tools:
    - fs
  services:
    - document.*
    - document_DetectType
    - document_ParseBytes
    - document_ExtractText
    - document_ExtractLayout
    - document_GetPages
    - document_ExtractTables
    - document_ExtractImages
    - document_RunOCR
    - ingestion.*
    - ingestion_StartRun
    - ingestion_GetRun
    - ingestion_ListRuns
    - ingestion_ResumeRun
    - ingestion_UpdateSourceState
    - ingestion_AppendArtifact
    - ingestion_MarkFailed
    - ingestion_MarkComplete
    - ingestion_CancelRun
    - ingestion_ListIncompleteSources
    - ingestion_ListArtifacts
    - embedding.*
    - embedding_Embed
    - indexer.*
    - indexer_IndexDocument
    - indexer_GetContext
    - indexer_DeleteChunk
    - citation.*
    - citation_ResolveSpans
    - citation_VerifyGrounding
    - memory.*
    - memory_Put
    - memory_Get
    - memory_Search
    - memory_Delete
  skills:
    - SKILL.md
