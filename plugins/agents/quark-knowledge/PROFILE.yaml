id: quark-knowledge
name: Quark Knowledge
role: delegate
description: Reads, structures, indexes, retrieves, and answers from workspace knowledge.
model:
  provider: ""
  model: ""
prompt:
  system: SYSTEM.md
  skills:
    - SKILL.md
permissions:
  services:
    - io_Read
    - io_List
    - io_Stat
    - io_ExtractPdf
    - io_ReadMedia
    - io_Write
    - io_Append
    - io_Replace
    - io_Remove
    - document_DetectType
    - document_ParseBytes
    - document_ExtractText
    - document_ExtractLayout
    - document_GetPages
    - document_ExtractTables
    - document_ExtractImages
    - document_RunOCR
    - runstate_StartRun
    - runstate_GetRun
    - runstate_ListRuns
    - runstate_ResumeRun
    - runstate_UpdateItemState
    - runstate_AppendArtifact
    - runstate_AppendReference
    - runstate_MarkFailed
    - runstate_MarkComplete
    - runstate_CancelRun
    - runstate_ListIncompleteItems
    - runstate_ListArtifacts
    - gateway_Embed
    - indexer_UpsertChunk
    - indexer_UpsertFact
    - indexer_UpsertEntity
    - indexer_UpsertRelation
    - indexer_UpsertCitation
    - indexer_IndexDocument
    - indexer_QueryContext
    - indexer_GetContext
    - indexer_DeleteDocument
    - indexer_DeleteChunk
    - citation_ResolveSpans
    - citation_CreateCitation
    - citation_VerifyGrounding
    - citation_ScoreCoverage
    - citation_RenderReferences
    - core_CreateWorkspaceMutationPlan
    - core_ApproveWorkspaceMutationPlan
    - core_RequestApproval
    - core_EvaluatePolicy
    - core_RecordAuditEvent
    - core_PutArtifact
    - workflow_Start
    - workflow_Query
    - workflow_Describe
    - workflow_List
    - workflow_StreamEvents
    - workflow_Cancel
approval:
  required_for:
    - workspace.write
    - source.delete
    - index.delete
handoff:
  can_delegate_to:
    - quark-devops
    - quark-system
evaluation:
  required_checks:
    - citation_coverage
    - answer_grounding
