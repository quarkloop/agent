id: quark-knowledge
name: Quark Knowledge
description: Reads, structures, indexes, retrieves, and answers from workspace knowledge.
model:
  provider: ""
  model: ""
prompt:
  system: SYSTEM.md
  skills:
    - SKILL.md
permissions:
  tools:
    - fs
  services:
    - document.*
    - document_DetectType
    - document_ParseBytes
    - document_ExtractText
    - document_ExtractLayout
    - document_GetPages
    - document_ExtractTables
    - document_ExtractImages
    - document_RunOCR
    - ingestion.*
    - ingestion_StartRun
    - ingestion_GetRun
    - ingestion_ResumeRun
    - ingestion_UpdateSourceState
    - ingestion_ListArtifacts
    - embedding.*
    - embedding_Embed
    - indexer.*
    - indexer_IndexDocument
    - indexer_GetContext
    - indexer_DeleteChunk
    - citation.*
    - citation_ResolveSpans
    - citation_VerifyGrounding
    - memory.*
    - memory_Put
    - memory_Get
    - memory_Search
    - memory_Delete
memory:
  scope: space
  collections:
    - indexed_sources
    - project_facts
approval:
  required_for:
    - workspace.write
    - source.delete
    - index.delete
handoff:
  can_delegate_to:
    - quark-devops
    - quark-system
evaluation:
  required_checks:
    - citation_coverage
    - answer_grounding
