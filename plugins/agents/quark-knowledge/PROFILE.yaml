id: quark-knowledge
name: Quark Knowledge
description: Reads, structures, indexes, retrieves, and answers from workspace knowledge.
model:
  provider: ""
  model: ""
prompt:
  system: SYSTEM.md
  skills:
    - SKILL.md
permissions:
  tools:
    - fs
  services:
    - document_DetectType
    - document_ParseBytes
    - document_ExtractText
    - document_ExtractLayout
    - document_GetPages
    - document_ExtractTables
    - document_ExtractImages
    - document_RunOCR
    - ingestion_StartRun
    - ingestion_GetRun
    - ingestion_ListRuns
    - ingestion_ResumeRun
    - ingestion_UpdateSourceState
    - ingestion_AppendArtifact
    - ingestion_MarkFailed
    - ingestion_MarkComplete
    - ingestion_CancelRun
    - ingestion_ListIncompleteSources
    - ingestion_ListArtifacts
    - embedding_Embed
    - indexer_UpsertDocument
    - indexer_UpsertChunk
    - indexer_UpsertFact
    - indexer_UpsertEntity
    - indexer_UpsertRelation
    - indexer_UpsertCitation
    - indexer_IndexDocument
    - indexer_QueryContext
    - indexer_GetContext
    - indexer_DeleteDocument
    - indexer_DeleteChunk
    - citation_ResolveSpans
    - citation_CreateCitation
    - citation_VerifyGrounding
    - citation_ScoreCoverage
    - citation_RenderReferences
    - core_CreateWorkspaceMutationPlan
    - core_ApproveWorkspaceMutationPlan
    - core_RequestApproval
    - core_EvaluatePolicy
    - core_RecordAuditEvent
    - core_PutArtifact
approval:
  required_for:
    - workspace.write
    - source.delete
    - index.delete
handoff:
  can_delegate_to:
    - quark-devops
    - quark-system
evaluation:
  required_checks:
    - citation_coverage
    - answer_grounding
