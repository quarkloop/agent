name: quark-devops
version: "1.0.0"
type: agent
mode: api
description: "Quark DevOps agent profile"
author: quarkloop
license: Apache-2.0

agent:
  profile: PROFILE.yaml
  system: SYSTEM.md
  skill: SKILL.md
  tools:
    - bash
    - fs
  services:
    - repo.*
    - build.*
    - test.*
    - container.*
    - release.*
    - deploy.*
    - policy.*
    - build-release.*
    - repo_Status
    - repo_Diff
    - repo_GetBranch
    - repo_ListChangedFiles
    - repo_ApplyPatch
    - repo_Commit
    - repo_GenerateReleaseNotes
    - build_DetectProject
    - build_ResolveTask
    - build_RunTask
    - build_CreateArtifact
    - test_DiscoverTests
    - test_RunTests
    - test_ExplainFailure
    - container_BuildImage
    - container_ListImages
    - container_PlanRun
    - deploy_Plan
    - deploy_Apply
    - policy_EvaluateChange
    - build_release_Release
    - build_release_DryRun
    - build_release_Init
  skills:
    - SKILL.md
