name: quark-devops
version: "1.0.0"
type: agent
description: "Quark DevOps agent profile"
author: quarkloop
license: Apache-2.0

agent:
  profile: PROFILE.yaml
  system: SYSTEM.md
  skill: SKILL.md
  services:
    - io_Read
    - io_List
    - io_Stat
    - io_Write
    - io_Append
    - io_Replace
    - io_Remove
    - io_Execute
    - io_SearchWeb
    - io_Fetch
    - repo_Status
    - repo_Diff
    - repo_GetBranch
    - repo_ListChangedFiles
    - repo_ApplyPatch
    - repo_Commit
    - repo_GenerateReleaseNotes
    - build_DetectProject
    - build_ResolveTask
    - build_RunTask
    - build_CreateArtifact
    - build_InitReleaseConfig
    - build_DryRunRelease
    - build_RunRelease
    - test_DiscoverTests
    - test_RunTests
    - test_ExplainFailure
    - container_BuildImage
    - container_ListImages
    - container_PlanRun
    - deploy_Plan
    - deploy_Apply
    - policy_EvaluateChange
    - harness_GetContextReport
    - harness_StreamContextReports
    - harness_PutMemory
    - harness_GetMemory
    - harness_SearchMemory
    - harness_DeleteMemory
  skills:
    - SKILL.md
