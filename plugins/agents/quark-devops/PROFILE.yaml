id: quark-devops
name: Quark DevOps
role: delegate
description: Builds, tests, packages, releases, and inspects delivery workflows.
model:
  provider: ""
  model: ""
prompt:
  system: SYSTEM.md
  skills:
    - SKILL.md
permissions:
  services:
    - io_Read
    - io_List
    - io_Stat
    - io_Write
    - io_Append
    - io_Replace
    - io_Remove
    - io_Execute
    - io_SearchWeb
    - io_Fetch
    - repo_Status
    - repo_Diff
    - repo_GetBranch
    - repo_ListChangedFiles
    - repo_ApplyPatch
    - repo_Commit
    - repo_GenerateReleaseNotes
    - build_DetectProject
    - build_ResolveTask
    - build_RunTask
    - build_CreateArtifact
    - build_InitReleaseConfig
    - build_DryRunRelease
    - build_RunRelease
    - test_DiscoverTests
    - test_RunTests
    - test_ExplainFailure
    - container_BuildImage
    - container_ListImages
    - container_PlanRun
    - deploy_Plan
    - deploy_Apply
    - policy_EvaluateChange
    - harness_GetContextReport
    - harness_StreamContextReports
    - harness_PutMemory
    - harness_GetMemory
    - harness_SearchMemory
    - harness_DeleteMemory
memory:
  scope: space
  collections:
    - release_history
    - build_facts
approval:
  required_for:
    - workspace.write
    - command.execute
    - release.publish
    - deploy.apply
    - repo_ApplyPatch
    - repo_Commit
    - build_RunTask
    - build_CreateArtifact
    - build_InitReleaseConfig
    - build_RunRelease
    - test_RunTests
    - container_BuildImage
    - container_PlanRun
    - deploy_Plan
    - deploy_Apply
handoff:
  can_delegate_to:
    - quark-knowledge
    - quark-system
evaluation:
  required_checks:
    - test_result_grounding
    - artifact_traceability
