name: space
version: "1.0.0"
type: service
mode: api
description: "Authoritative space configuration and opaque record persistence over NATS"
author: quarkloop
license: Apache-2.0

service:
  address_env: QUARK_SPACE_SERVICE_ADDR
  health:
    protocol: nats_service
    service: quark.space.v1.SpaceService
    timeout: 5s
  readiness:
    required: true
    min_version: "1.0.0"
  skill: SKILL.md
  readme: README.md
  proto_services:
    - quark.space.v1.SpaceService
  functions:
    - name: space_CreateSpace
      service: quark.space.v1.SpaceService
      method: CreateSpace
      request: quark.space.v1.CreateSpaceRequest
      response: quark.space.v1.Space
      description: "Create a space and persist its initial configuration."
      risk_level: write
      approval_required: true
      approval_requirements:
        - space-create
      streaming: false
      idempotent: false
    - name: space_UpdateConfig
      service: quark.space.v1.SpaceService
      method: UpdateConfig
      request: quark.space.v1.UpdateConfigRequest
      response: quark.space.v1.Space
      description: "Replace the authoritative configuration for a space."
      risk_level: write
      approval_required: true
      approval_requirements:
        - space-config-write
      streaming: false
      idempotent: false
    - name: space_GetSpace
      service: quark.space.v1.SpaceService
      method: GetSpace
      request: quark.space.v1.GetSpaceRequest
      response: quark.space.v1.Space
      description: "Return persisted space metadata."
      risk_level: read
      approval_required: false
      streaming: false
      idempotent: true
    - name: space_ListSpaces
      service: quark.space.v1.SpaceService
      method: ListSpaces
      request: google.protobuf.Empty
      response: quark.space.v1.ListSpacesResponse
      description: "List registered spaces."
      risk_level: read
      approval_required: false
      streaming: false
      idempotent: true
    - name: space_DeleteSpace
      service: quark.space.v1.SpaceService
      method: DeleteSpace
      request: quark.space.v1.DeleteSpaceRequest
      response: google.protobuf.Empty
      description: "Delete a space and its service-owned data."
      risk_level: admin
      approval_required: true
      approval_requirements:
        - space-delete
      streaming: false
      idempotent: false
    - name: space_GetConfig
      service: quark.space.v1.SpaceService
      method: GetConfig
      request: quark.space.v1.GetConfigRequest
      response: quark.space.v1.ConfigResponse
      description: "Return the authoritative space configuration."
      risk_level: read
      approval_required: false
      streaming: false
      idempotent: true
    - name: space_PutRecord
      service: quark.space.v1.SpaceService
      method: PutRecord
      request: quark.space.v1.PutRecordRequest
      response: quark.space.v1.Record
      description: "Persist an opaque record whose semantics remain caller-owned."
      risk_level: write
      approval_required: true
      approval_requirements:
        - space-record-write
      streaming: false
      idempotent: false
    - name: space_GetRecord
      service: quark.space.v1.SpaceService
      method: GetRecord
      request: quark.space.v1.GetRecordRequest
      response: quark.space.v1.Record
      description: "Read one opaque record by namespace and key."
      risk_level: read
      approval_required: false
      streaming: false
      idempotent: true
    - name: space_ListRecords
      service: quark.space.v1.SpaceService
      method: ListRecords
      request: quark.space.v1.ListRecordsRequest
      response: quark.space.v1.ListRecordsResponse
      description: "List opaque records within one namespace."
      risk_level: read
      approval_required: false
      streaming: false
      idempotent: true
    - name: space_DeleteRecord
      service: quark.space.v1.SpaceService
      method: DeleteRecord
      request: quark.space.v1.DeleteRecordRequest
      response: google.protobuf.Empty
      description: "Delete one opaque record by namespace and key."
      risk_level: write
      approval_required: true
      approval_requirements:
        - space-record-delete
      streaming: false
      idempotent: false
    - name: space_Doctor
      service: quark.space.v1.SpaceService
      method: Doctor
      request: quark.space.v1.DoctorRequest
      response: quark.space.v1.DoctorResponse
      description: "Validate the persisted space configuration."
      risk_level: read
      approval_required: false
      streaming: false
      idempotent: true
