name: indexer
version: "1.0.0"
type: service
mode: api
description: "GraphRAG indexing and retrieval over gRPC"
author: quarkloop
license: Apache-2.0

service:
  address_env: QUARK_INDEXER_ADDR
  health:
    protocol: grpc_health_v1
    service: quark.indexer.v1.IndexerService
    timeout: 5s
  readiness:
    required: true
    min_version: "1.0.0"
  skill: SKILL.md
  readme: README.md
  proto_services:
    - quark.indexer.v1.IndexerService
  functions:
    - name: indexer_IndexDocument
      service: quark.indexer.v1.IndexerService
      method: IndexDocument
      request: quark.indexer.v1.IndexRequest
      response: quark.indexer.v1.IndexStatus
      description: "Persist one canonical index record: document, chunk, embedding metadata, graph data, facts, citations, and provenance."
      risk_level: write
      approval_required: false
      streaming: false
      idempotent: true
    - name: indexer_GetContext
      service: quark.indexer.v1.IndexerService
      method: GetContext
      request: quark.indexer.v1.QueryRequest
      response: quark.indexer.v1.ContextResponse
      description: "Retrieve vector and graph context for an agent-provided query embedding."
      risk_level: read
      approval_required: false
      streaming: false
      idempotent: true
    - name: indexer_DeleteChunk
      service: quark.indexer.v1.IndexerService
      method: DeleteChunk
      request: quark.indexer.v1.DeleteChunkRequest
      response: quark.indexer.v1.DeleteChunkResponse
      description: "Delete one indexed chunk and its chunk-owned edges by canonical chunk ID."
      risk_level: admin
      approval_required: true
      approval_requirements:
        - index-delete
      streaming: false
      idempotent: false
