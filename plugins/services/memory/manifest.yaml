name: memory
version: "1.0.0"
type: service
mode: api
description: "Space-scoped agent memory records over gRPC"
author: quarkloop
license: Apache-2.0

service:
  address_env: QUARK_MEMORY_ADDR
  health:
    protocol: grpc_health_v1
    service: quark.memory.v1.MemoryService
    timeout: 5s
  readiness:
    required: true
    min_version: "1.0.0"
  skill: SKILL.md
  readme: README.md
  proto_services:
    - quark.memory.v1.MemoryService
  functions:
    - name: memory_Put
      service: quark.memory.v1.MemoryService
      method: Put
      request: quark.memory.v1.PutRequest
      response: quark.memory.v1.PutResponse
      description: "Persist an explicit space-scoped memory record with provenance."
      risk_level: write
      approval_required: false
      streaming: false
      idempotent: false
    - name: memory_Get
      service: quark.memory.v1.MemoryService
      method: Get
      request: quark.memory.v1.GetRequest
      response: quark.memory.v1.GetResponse
      description: "Fetch one memory record by space, collection, and key."
      risk_level: read
      approval_required: false
      streaming: false
      idempotent: true
    - name: memory_Search
      service: quark.memory.v1.MemoryService
      method: Search
      request: quark.memory.v1.SearchRequest
      response: quark.memory.v1.SearchResponse
      description: "Search explicit memory records in one space and collection."
      risk_level: read
      approval_required: false
      streaming: false
      idempotent: true
    - name: memory_Delete
      service: quark.memory.v1.MemoryService
      method: Delete
      request: quark.memory.v1.DeleteRequest
      response: quark.memory.v1.DeleteResponse
      description: "Delete an explicit memory record by space, collection, and key."
      risk_level: write
      approval_required: true
      approval_requirements:
        - memory-delete
      streaming: false
      idempotent: false
