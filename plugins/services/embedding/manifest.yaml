name: embedding
version: "1.0.0"
type: service
mode: api
description: "Local deterministic text embeddings over NATS with provider/model/dimension/content-hash metadata"
author: quarkloop
license: Apache-2.0

service:
  address_env: QUARK_EMBEDDING_ADDR
  health:
    protocol: nats_service
    service: quark.embedding.v1.EmbeddingService
    timeout: 5s
  readiness:
    required: true
    min_version: "1.0.0"
  skill: SKILL.md
  readme: README.md
  proto_services:
    - quark.embedding.v1.EmbeddingService
  functions:
    - name: embedding_Embed
      service: quark.embedding.v1.EmbeddingService
      method: Embed
      request: quark.embedding.v1.EmbedRequest
      response: quark.embedding.v1.EmbedResponse
      description: "Create a deterministic local embedding for the supplied text and return provider, model, dimensions, and content hash."
      risk_level: read
      approval_required: false
      streaming: false
      idempotent: true
