name: secrets
version: "1.0.0"
type: service
mode: api
description: "OpenBao-backed secret resolution, scoped tokens, leases, rotation, and audit"
author: quarkloop
license: Apache-2.0

service:
  address_env: QUARK_SECRETS_ADDR
  health:
    protocol: nats_service
    service: quark.secrets.v1.SecretsService
    timeout: 5s
  readiness:
    required: true
    min_version: "1.0.0"
  skill: SKILL.md
  readme: README.md
  proto_services:
    - quark.secrets.v1.SecretsService
  functions:
    - name: secrets_ResolveRef
      service: quark.secrets.v1.SecretsService
      method: ResolveRef
      request: quark.secrets.v1.ResolveRefRequest
      response: quark.secrets.v1.ResolveRefResponse
      description: "Resolve an OpenBao secret reference with optional value disclosure for approved callers."
      risk_level: admin
      approval_required: true
      approval_requirements:
        - secrets.resolve
      streaming: false
      idempotent: true
    - name: secrets_IssueScopedSecret
      service: quark.secrets.v1.SecretsService
      method: IssueScopedSecret
      request: quark.secrets.v1.IssueScopedSecretRequest
      response: quark.secrets.v1.IssueScopedSecretResponse
      description: "Issue a scoped OpenBao token for a bounded purpose."
      risk_level: admin
      approval_required: true
      approval_requirements:
        - secrets.issue
      streaming: false
      idempotent: false
    - name: secrets_RenewLease
      service: quark.secrets.v1.SecretsService
      method: RenewLease
      request: quark.secrets.v1.RenewLeaseRequest
      response: quark.secrets.v1.RenewLeaseResponse
      description: "Renew an OpenBao lease."
      risk_level: write
      approval_required: false
      streaming: false
      idempotent: false
    - name: secrets_RevokeLease
      service: quark.secrets.v1.SecretsService
      method: RevokeLease
      request: quark.secrets.v1.RevokeLeaseRequest
      response: quark.secrets.v1.RevokeLeaseResponse
      description: "Revoke an OpenBao lease."
      risk_level: write
      approval_required: true
      approval_requirements:
        - secrets.revoke
      streaming: false
      idempotent: false
    - name: secrets_RotateSecret
      service: quark.secrets.v1.SecretsService
      method: RotateSecret
      request: quark.secrets.v1.RotateSecretRequest
      response: quark.secrets.v1.RotateSecretResponse
      description: "Rotate a KV v2 secret value using check-and-set when supplied."
      risk_level: admin
      approval_required: true
      approval_requirements:
        - secrets.rotate
      streaming: false
      idempotent: false
    - name: secrets_AuditAccess
      service: quark.secrets.v1.SecretsService
      method: AuditAccess
      request: quark.secrets.v1.AuditAccessRequest
      response: quark.secrets.v1.AuditAccessResponse
      description: "Record a redacted secret access audit event."
      risk_level: write
      approval_required: false
      streaming: false
      idempotent: false
