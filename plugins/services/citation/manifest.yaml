name: citation
version: "1.0.0"
type: service
description: "Source span resolution and grounding verification over NATS"
author: quarkloop
license: Apache-2.0

service:
  health:
    protocol: nats_service
    service: quark.citation.v1.CitationService
    timeout: 5s
  readiness:
    required: true
    min_version: "1.0.0"
  skill: SKILL.md
  readme: README.md
  proto_services:
    - quark.citation.v1.CitationService
  functions:
    - name: citation_ResolveSpans
      service: quark.citation.v1.CitationService
      method: ResolveSpans
      request: quark.citation.v1.ResolveSpansRequest
      response: quark.citation.v1.ResolveSpansResponse
      description: "Resolve selected claim text into source spans with offsets and confidence."
      risk_level: read
      approval_required: false
      streaming: false
      idempotent: true
    - name: citation_CreateCitation
      service: quark.citation.v1.CitationService
      method: CreateCitation
      request: quark.citation.v1.CreateCitationRequest
      response: quark.citation.v1.CitationSpan
      description: "Create one normalized citation span from source text and selected evidence."
      risk_level: read
      approval_required: false
      streaming: false
      idempotent: true
    - name: citation_VerifyGrounding
      service: quark.citation.v1.CitationService
      method: VerifyGrounding
      request: quark.citation.v1.VerifyGroundingRequest
      response: quark.citation.v1.VerifyGroundingResponse
      description: "Mechanically verify that selected claims are grounded by provided citation spans."
      risk_level: read
      approval_required: false
      streaming: false
      idempotent: true
    - name: citation_ScoreCoverage
      service: quark.citation.v1.CitationService
      method: ScoreCoverage
      request: quark.citation.v1.ScoreCoverageRequest
      response: quark.citation.v1.ScoreCoverageResponse
      description: "Score citation coverage across selected claims."
      risk_level: read
      approval_required: false
      streaming: false
      idempotent: true
    - name: citation_RenderReferences
      service: quark.citation.v1.CitationService
      method: RenderReferences
      request: quark.citation.v1.RenderReferencesRequest
      response: quark.citation.v1.RenderReferencesResponse
      description: "Render normalized source references for grounded answers."
      risk_level: read
      approval_required: false
      streaming: false
      idempotent: true
