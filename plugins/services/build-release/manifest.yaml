name: build-release
version: "1.0.0"
type: service
mode: api
description: "Build and release automation over gRPC"
author: quarkloop
license: Apache-2.0

service:
  address_env: QUARK_BUILD_RELEASE_ADDR
  health:
    protocol: grpc_health_v1
    service: quark.buildrelease.v1.BuildReleaseService
    timeout: 5s
  readiness:
    required: true
    min_version: "1.0.0"
  skill: SKILL.md
  readme: README.md
  proto_services:
    - quark.buildrelease.v1.BuildReleaseService
  functions:
    - name: build_release_Release
      service: quark.buildrelease.v1.BuildReleaseService
      method: Release
      request: quark.buildrelease.v1.ReleaseRequest
      response: quark.buildrelease.v1.ReleaseResponse
      description: "Run the configured build and release pipeline."
      risk_level: admin
      approval_required: true
      approval_requirements:
        - release-artifacts
        - command-execution
      streaming: false
      idempotent: false
    - name: build_release_DryRun
      service: quark.buildrelease.v1.BuildReleaseService
      method: DryRun
      request: quark.buildrelease.v1.DryRunRequest
      response: quark.buildrelease.v1.DryRunResponse
      description: "Preview planned release artifacts without compiling."
      risk_level: read
      approval_required: false
      streaming: false
      idempotent: true
    - name: build_release_Init
      service: quark.buildrelease.v1.BuildReleaseService
      method: Init
      request: quark.buildrelease.v1.InitRequest
      response: quark.buildrelease.v1.InitResponse
      description: "Create a default build_release.json in a working directory."
      risk_level: write
      approval_required: true
      approval_requirements:
        - workspace-write
      streaming: false
      idempotent: false
